<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>jrnl dashboard</title>
<style>
:root {
  --bg: #f8f9fa;
  --surface: #ffffff;
  --border: #e2e8f0;
  --text: #1a202c;
  --text-muted: #718096;
  --accent: #3182ce;
  --accent-light: #ebf8ff;
  --tag-bg: #edf2f7;
  --tag-text: #4a5568;
  --tag-active-bg: #3182ce;
  --tag-active-text: #ffffff;
  --drop-bg: #f0fff4;
  --drop-border: #68d391;
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.5;
}
.container { max-width:1100px; margin:0 auto; height:100vh; display:flex; flex-direction:column; overflow:hidden; }
.header { flex-shrink:0; display:flex; align-items:center; justify-content:space-between; padding:16px 20px; flex-wrap:wrap; gap:8px; }
.header h1 { font-size:22px; font-weight:700; letter-spacing:-0.3px; }
.file-info { font-size:13px; color:var(--text-muted); }

.drop-zone { flex:1; display:flex; align-items:center; justify-content:center; margin:24px 20px; border:2px dashed var(--border); border-radius:12px; cursor:pointer; transition:all 0.2s; background:var(--surface); }
.drop-zone.active { border-color:var(--drop-border); background:var(--drop-bg); }
.drop-zone.has-data { display:none; }
.drop-zone-inner { text-align:center; color:var(--text-muted); font-size:15px; }
.drop-zone-inner .icon { font-size:36px; margin-bottom:8px; display:block; }

#app { display:none; flex:1; min-height:0; }
#app.visible { display:flex; flex-direction:column; }

.stats-row { flex-shrink:0; display:flex; gap:12px; padding:0 24px 12px; flex-wrap:wrap; }
.stat { padding:8px 14px; background:var(--surface); border-radius:8px; border:1px solid var(--border); min-width:90px; }
.stat .num { font-size:20px; font-weight:700; }
.stat .label { font-size:10px; color:var(--text-muted); text-transform:uppercase; }

.main-panel { flex:1; display:flex; gap:20px; padding:0 24px; min-height:0; }
.sidebar { width:190px; flex-shrink:0; display:flex; flex-direction:column; min-height:0; }
.sidebar h2 { font-size:12px; font-weight:600; text-transform:uppercase; letter-spacing:0.5px; color:var(--text-muted); margin-bottom:6px; flex-shrink:0; }
.sidebar .tag-search { width:100%; padding:5px 8px; border:1px solid var(--border); border-radius:6px; font-size:12px; margin-bottom:6px; outline:none; font-family:inherit; flex-shrink:0; }
.sidebar .tag-search:focus { border-color:var(--accent); box-shadow:0 0 0 2px var(--accent-light); }
.tag-list { list-style:none; overflow-y:auto; flex:1; min-height:0; }
.tag-list li { margin-bottom:1px; }
.tag-btn { display:flex; align-items:center; justify-content:space-between; width:100%; padding:4px 8px; border:none; background:none; cursor:pointer; font-size:12px; color:var(--tag-text); border-radius:5px; transition:all 0.12s; font-family:inherit; text-align:left; }
.tag-btn:hover { background:var(--tag-bg); }
.tag-btn.active { background:var(--tag-active-bg); color:var(--tag-active-text); }
.tag-btn .count { font-size:10px; color:var(--text-muted); background:var(--tag-bg); padding:0 5px; border-radius:7px; }
.tag-btn.active .count { background:rgba(255,255,255,0.2); color:#fff; }

.content { flex:1; display:flex; flex-direction:column; min-width:0; min-height:0; }
.search-bar { width:100%; padding:8px 14px; border:1px solid var(--border); border-radius:8px; font-size:14px; outline:none; font-family:inherit; background:var(--surface); flex-shrink:0; margin-bottom:6px; }
.search-bar:focus { border-color:var(--accent); box-shadow:0 0 0 3px var(--accent-light); }
.active-filters { display:flex; gap:4px; flex-wrap:wrap; flex-shrink:0; margin-bottom:6px; min-height:0; }
.filter-chip { font-size:11px; padding:2px 8px; background:var(--accent); color:#fff; border-radius:10px; display:flex; align-items:center; gap:4px; cursor:pointer; }
.filter-chip .remove { font-size:13px; line-height:1; }

.entries-panel { flex:1; overflow-y:auto; min-height:0; }
.month-group { margin-bottom:16px; }
.month-header { font-size:14px; font-weight:600; color:var(--accent); margin-bottom:4px; padding-bottom:3px; border-bottom:1px solid var(--border); position:sticky; top:0; background:var(--bg); z-index:2; }
.entry { padding:6px 10px; border-radius:5px; margin-bottom:1px; font-size:13px; line-height:1.4; display:flex; gap:10px; align-items:baseline; scroll-margin-top:28px; }
.entry:hover { background:var(--surface); }
.entry.highlight { background:var(--accent-light); animation:flash 1s ease-out; }
@keyframes flash { from { background:var(--accent); } to { background:var(--accent-light); } }
.entry .time { font-size:11px; color:var(--text-muted); white-space:nowrap; flex-shrink:0; font-variant-numeric:tabular-nums; min-width:58px; }
.entry .body { flex:1; }
.entry .tags { display:flex; gap:3px; flex-wrap:wrap; margin-top:1px; }
.entry .tag { font-size:10px; color:var(--accent); cursor:pointer; }
.entry .tag:hover { text-decoration:underline; }
.entry.hidden { display:none; }
.day-anchor { scroll-margin-top:28px; }
.no-results { text-align:center; padding:30px; color:var(--text-muted); font-size:14px; }
</style>
</head>
<body>

<div class="container">

<div class="header">
  <h1>jrnl dashboard</h1>
  <span class="file-info" id="fileInfo"></span>
</div>

<div class="drop-zone" id="dropZone">
  <div class="drop-zone-inner">
    <span class="icon">&#128214;</span>
    <p>Drop your jrnl file here<br><span style="font-size:12px">or click to browse</span></p>
  </div>
</div>

<div id="app">
  <div class="stats-row" id="statsRow"></div>

  <div class="main-panel">
    <div class="sidebar">
      <h2>Tags</h2>
      <input type="text" class="tag-search" id="tagSearch" placeholder="Filter tags...">
      <ul class="tag-list" id="tagList"></ul>
    </div>
    <div class="content">
      <input type="text" class="search-bar" id="searchBar" placeholder="Search entries...">
      <div class="active-filters" id="activeFilters"></div>
      <div class="entries-panel" id="entriesPanel">
        <div id="entries"></div>
      </div>
    </div>
  </div>
</div>

<script>
let entries = [];
let tags = {};
let activeTags = new Set();
let searchQuery = '';

function formatSwiss(date) { return date.slice(8) + '.' + date.slice(5,7) + '.'; }
function formatSwissDateTime(date, time) { return formatSwiss(date) + ' ' + time; }

const dropZone = document.getElementById('dropZone');
const app = document.getElementById('app');
const fileInfo = document.getElementById('fileInfo');

dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('active'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('active'));
dropZone.addEventListener('drop', e => {
  e.preventDefault();
  dropZone.classList.remove('active');
  const file = e.dataTransfer.files[0];
  if (file) loadFile(file);
});
dropZone.addEventListener('click', () => {
  const input = document.createElement('input');
  input.type = 'file';
  input.accept = '.txt';
  input.onchange = () => { if (input.files[0]) loadFile(input.files[0]); };
  input.click();
});

function loadFile(file) {
  activeTags.clear();
  searchQuery = '';
  document.getElementById('searchBar').value = '';
  document.getElementById('tagSearch').value = '';
  const reader = new FileReader();
  reader.onload = () => {
    parseData(reader.result);
    dropZone.classList.add('has-data');
    app.classList.add('visible');
    fileInfo.textContent = file.name + '  \u00b7  ' + entries.length + ' entries';
  };
  reader.readAsText(file);
}

function parseData(text) {
  entries = [];
  tags = {};
  const lines = text.split('\n');

  for (const line of lines) {
    const match = line.match(/^\[(\d{4}-\d{2}-\d{2}) (\d{2}:\d{2})\]\s+(.+)$/);
    if (!match) continue;

    const [, date, time, body] = match;
    const tagMatches = body.match(/@(\S+)/g) || [];
    const entryTags = tagMatches.map(t => t.slice(1));
    const cleanBody = body.replace(/\s*@\S+/g, '').trim();

    const entry = { date, time, body: cleanBody, tags: entryTags, raw: body };
    entries.push(entry);

    for (const tag of entryTags) {
      tags[tag] = (tags[tag] || 0) + 1;
    }
  }

  entries.reverse();
  renderAll();
}

function renderAll() {
  renderStats();
  renderTags();
  renderEntries();
}

function renderStats() {
  const total = entries.length;
  const uniqueTags = Object.keys(tags).length;
  const days = new Set(entries.map(e => e.date)).size;
  document.getElementById('statsRow').innerHTML =
    `<div class="stat"><div class="num">${total}</div><div class="label">Entries</div></div>` +
    `<div class="stat"><div class="num">${days}</div><div class="label">Days</div></div>` +
    `<div class="stat"><div class="num">${uniqueTags}</div><div class="label">Tags</div></div>`;
}

function renderTags() {
  const tagSearchV = (document.getElementById('tagSearch')?.value || '').toLowerCase();
  const searchQ = searchQuery.toLowerCase();

  let filteredForTags = entries;
  if (searchQ) {
    const words = searchQ.split(/\s+/).filter(w => w.length > 0);
    filteredForTags = filteredForTags.filter(e =>
      words.every(word =>
        e.body.toLowerCase().includes(word) ||
        e.date.includes(word) ||
        formatSwiss(e.date).includes(word) ||
        e.tags.some(t => t.toLowerCase().includes(word))
      )
    );
  }

  const tagCounts = {};
  for (const e of filteredForTags) {
    for (const t of e.tags) {
      tagCounts[t] = (tagCounts[t] || 0) + 1;
    }
  }

  const sorted = Object.entries(tagCounts).sort((a,b) => b[1] - a[1]);
  const filtered = sorted.filter(([tag]) => tag.toLowerCase().includes(tagSearchV));
  const list = document.getElementById('tagList');
  list.innerHTML = filtered.map(([tag, count]) =>
    `<li><button class="tag-btn${activeTags.has(tag)?' active':''}" data-tag="${tag}">${tag}<span class="count">${count}</span></button></li>`
  ).join('');

  list.querySelectorAll('.tag-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const tag = btn.dataset.tag;
      activeTags.has(tag) ? activeTags.delete(tag) : activeTags.add(tag);
      renderAll();
    });
  });
}

function renderEntries() {
  const search = searchQuery.toLowerCase();
  let filtered = entries;

  if (activeTags.size > 0) {
    filtered = filtered.filter(e => {
      for (const t of activeTags) if (!e.tags.includes(t)) return false;
      return true;
    });
  }

  if (search) {
    const words = search.split(/\s+/).filter(w => w.length > 0);
    filtered = filtered.filter(e =>
      words.every(word =>
        e.body.toLowerCase().includes(word) ||
        e.date.includes(word) ||
        formatSwiss(e.date).includes(word) ||
        e.tags.some(t => t.toLowerCase().includes(word))
      )
    );
  }

  const activeFiltersDiv = document.getElementById('activeFilters');
  if (activeTags.size > 0) {
    activeFiltersDiv.innerHTML = Array.from(activeTags).map(t =>
      `<span class="filter-chip" data-tag="${t}">@${t} <span class="remove">&times;</span></span>`
    ).join('');
    activeFiltersDiv.querySelectorAll('.filter-chip').forEach(chip => {
      chip.addEventListener('click', () => {
        activeTags.delete(chip.dataset.tag);
        renderAll();
      });
    });
  } else {
    activeFiltersDiv.innerHTML = '';
  }

  const container = document.getElementById('entries');
  if (filtered.length === 0) {
    container.innerHTML = '<div class="no-results">No entries match your filters</div>';
    return;
  }

  const months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  let html = '';
  let lastMonth = '';
  let lastDate = '';

  for (const e of filtered) {
    const month = e.date.slice(0,7);
    if (month !== lastMonth) {
      if (lastMonth) html += '</div>';
      lastMonth = month;
      lastDate = '';
      const [y,m] = month.split('-');
      html += `<div class="month-group"><div class="month-header">${months[parseInt(m)-1]} ${y} (${filtered.filter(x=>x.date.startsWith(month)).length})</div>`;
    }
    if (e.date !== lastDate) {
      html += `<div class="day-anchor" id="d-${e.date}"></div>`;
      lastDate = e.date;
    }
    const tagSpan = e.tags.map(t => `<span class="tag" data-tag="${t}">@${t}</span>`).join(' ');
    html += `<div class="entry" data-date="${e.date}">
      <span class="time">${formatSwissDateTime(e.date, e.time)}</span>
      <div class="body">${e.body}${e.tags.length ? '<div class="tags">' + tagSpan + '</div>' : ''}</div>
    </div>`;
  }
  html += '</div>';
  container.innerHTML = html;

  container.querySelectorAll('.tag').forEach(tagEl => {
    tagEl.addEventListener('click', e => {
      e.stopPropagation();
      const tag = tagEl.dataset.tag;
      if (!activeTags.has(tag)) {
        activeTags.add(tag);
        renderAll();
      }
    });
  });
}

document.getElementById('searchBar').addEventListener('input', e => {
  searchQuery = e.target.value;
  renderAll();
});

document.getElementById('tagSearch').addEventListener('input', renderTags);
</script>

</div>
</body>
</html>
